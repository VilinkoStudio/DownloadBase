name: Multi-Assets Deploy (Windows)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process Files and Build MSI
        shell: pwsh # 明确指定使用 PowerShell
        run: |
          # 1. 创建输出目录结构
          New-Item -ItemType Directory -Force -Path dist\download
          New-Item -ItemType Directory -Force -Path dist\res

          # 2. 压缩原本的资源
          # Windows 环境下推荐直接使用预装的 7z，速度快且通配符支持好
          7z a -tzip dist\download\lightframe.zip .\lightframe\*
          7z a -tzip dist\download\pogget.zip .\pogget\*
          7z a -tzip dist\download\pogget_arm64.zip .\pogget_arm64\*
          7z a -tzip dist\download\lightframe_x86.zip .\lightframe\lightframe_x86\*

          # --- 新增步骤：把当前目录 res/ 下的所有东西 copy 到目标的 /res 目录下 ---
          if (Test-Path .\res\*) {
              Copy-Item -Path .\res\* -Destination .\dist\res\ -Recurse -Force
          }

          # 3. 保留静态页面必需文件 (忽略报错以防文件不存在)
          Copy-Item -Path .\CNAME -Destination .\dist\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\404.html -Destination .\dist\ -ErrorAction SilentlyContinue

          # ==========================================
          # 4. 【修改部分】使用 WiX Toolset 直接将现成的 exe 打包成 MSI
          # ==========================================
          # 将 WiX 的 bin 目录临时加入环境变量
          $env:Path += ";C:\Program Files (x86)\WiX Toolset v3.11\bin"

          # 编译 wxs 文件 (假设你的 WiX 配置文件名为 Setup.wxs)
          candle.exe Setup.wxs -arch x64

          # 链接生成 msi 文件，并输出到 download 目录
          light.exe Setup.wixobj -ext WixUIExtension -out dist\download\Pogget_Setup.msi

          # 5. 处理版本元数据
          $tagName = $env:GITHUB_REF -replace '^refs/tags/', ''
          # 防错：如果是 push 到 main 而不是打 tag 触发的，给个默认值
          if ($tagName -match '^refs/heads/') { $tagName = "latest" } 
          
          (Get-Content metadata.json) -replace 'VERSION_PLACEHOLDER', $tagName | Set-Content dist\version.json

      - name: Deploy to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true